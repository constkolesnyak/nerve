<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nerve</title>
    <script>
      (function() {
        var p = localStorage.getItem('nerve-theme');
        if (p === 'light' || p === 'dark') {
          document.documentElement.setAttribute('data-theme', p);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
